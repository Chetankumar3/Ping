name: CI/CD Pipeline

on:
  push:
    branches:
      - main 

jobs:
  # ---------------------------------------------------
  # PHASE 1: Run Integration Tests
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    
    # Spin up an isolated Postgres container for the test suite
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ping_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Inject environment variables (now pointing to the Postgres container)
    env:
      JWT_SECRET: "this-is-a-super-secret-dummy-key-for-testing-only"
      WEBCLIENT_ID: "dummy-google-client-id.apps.googleusercontent.com"
      ALGORITHM: "HS256"
      DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/TE" 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
          # Make sure asyncpg is installed for Postgres, and pytest-asyncio for tests
          pip install asyncpg pytest pytest-asyncio

      - name: Run Pytest
        run: |
          cd backend
          pytest -v

  # ---------------------------------------------------
  # PHASE 2: Deploy to AWS EC2
  # ---------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test # CRITICAL: This forces the deployment to wait for tests

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "CI Tests Passed! Deploying to EC2..."
            
            cd /home/ubuntu/ChatApp
            chmod +x deploy.sh
            ./deploy.sh