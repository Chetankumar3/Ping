name: CI/CD Pipeline

on:
  push:
    branches:
      - main 

jobs:
  # ---------------------------------------------------
  # PHASE 1: Run Integration Tests
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ping_test_db 
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      JWT_SECRET: "this-is-a-super-secret-dummy-key-for-testing-only"
      WEBCLIENT_ID: "dummy-google-client-id.apps.googleusercontent.com"
      ALGORITHM: "HS256"
      DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/ping_test_db"
      CONNECT_ARGS: "{}"
      POOL_SIZE: 5
      MAX_OVERFLOW: 3
      POOL_TIMEOUT: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
          pip install asyncpg pytest pytest-asyncio

      - name: Run Pytest
        run: |
          cd backend
          pytest -v

  # ---------------------------------------------------
  # PHASE 2: Deploy to AWS EC2
  # ---------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test 

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e  # Stop script execution if any command fails
            
            echo "🚀 Starting Deployment Process..."
            cd /home/ubuntu/ChatApp
            
            # --- BACKEND UPDATE ---
            echo "📥 Pulling latest changes from Git..."
            git pull origin main
            
            echo "⚙️ Restarting Backend Service (Gunicorn/Uvicorn)..."
            sudo systemctl restart chatapp
            
            # --- FRONTEND UPDATE ---
            echo "🏗️ Building Frontend assets..."
            # Adjust 'frontend' to your actual directory name if it differs
            cd frontend 
            
            npm install --quiet
            npm run build
            
            # --- FINAL CHECK ---
            echo "✅ Deployment Successful!"
            sudo systemctl is-active chatapp